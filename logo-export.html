<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Export</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; }

    /* ── 1024×1024 square icon (dark bg, centred wordmark) ── */
    .icon-1024 {
      width: 1024px;
      height: 1024px;
      background: #0a0d14;
      border-radius: 210px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-1024 .wordmark {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 148px;
      letter-spacing: -4px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1;
    }
    .icon-1024 .wordmark .dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #f5a623;
      flex-shrink: 0;
      /* optically align to cap-height */
      margin-bottom: 4px;
    }

    /* ── Flat / transparent version for light backgrounds ── */
    .logo-flat {
      background: transparent;
      padding: 40px 60px;
      display: flex;
      align-items: center;
    }
    .logo-flat .wordmark {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 120px;
      letter-spacing: -3px;
      color: #0a0d14;
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1;
    }
    .logo-flat .wordmark .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #f5a623;
      flex-shrink: 0;
      margin-bottom: 4px;
    }

    .label {
      font-family: sans-serif;
      font-size: 13px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>

  <p class="label">1024 × 1024 — dark rounded (Facebook / Meta app icon)</p>
  <div class="icon-1024" id="icon-square">
    <div class="wordmark">
      thejarr<span class="dot"></span>
    </div>
  </div>

  <p class="label">Wordmark — light background</p>
  <div class="logo-flat" id="logo-flat">
    <div class="wordmark">
      thejarr<span class="dot"></span>
    </div>
  </div>

  <p class="label" style="max-width:600px; text-align:center; line-height:1.6;">
    To export as PNG: right-click the element → Inspect → in DevTools,
    right-click the node → "Capture node screenshot" (Chrome). Or use
    browser zoom at 1× and screenshot the element.
  </p>

</body>
</html>
